<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>beatsbyhil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      color: #fff;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .bio {
      font-size: 0.875rem;
      color: #a1a1aa;
      line-height: 1.5;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: #222;
      border-color: #3a3a3a;
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-icon.tiktok  { background: #111; }
    .link-icon.ig      { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4); }

    .link-label {
      flex: 1;
    }

    .link-sub {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: #71717a;
      margin-top: 1px;
    }

    .footer {
      font-size: 0.75rem;
      color: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar">bh</div>

    <div class="profile">
      <span class="name">beatsbyhil</span>
      <span class="bio">producer · beats for sale · custom orders open</span>
    </div>

    <div class="links">

      <!-- TikTok -->
      <a class="link-btn" href="https://www.tiktok.com/@beatsbyhil" target="_blank" rel="noopener">

          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.34 6.34 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
          </svg>
        </div>
        <div class="link-label">
          TikTok
          <span class="link-sub">@beatsbyhil</span>
        </div>
      </a>

      <!-- Instagram -->
      <a class="link-btn" href="https://www.instagram.com/beatsbyhil" target="_blank" rel="noopener">
        <div class="link-icon ig">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>

        </div>
        <div class="link-label">
          Instagram
          <span class="link-sub">@beatsbyhil</span>
        </div>
      </a>

    </div>

    <span class="footer">beatsbyhil · 2026</span>

  </div>
</body>
</html>
