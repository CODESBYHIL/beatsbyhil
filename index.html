  <title>beatsbyhil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #0d0d0d;
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .profile {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .bio {
      font-size: 0.8125rem;
      color: #666;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 15px 18px;
      border-radius: 12px;
      background: #161616;
      border: 1px solid #222;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .link-btn:hover {
      background: #1e1e1e;
      border-color: #333;
      transform: translateY(-1px);
    }

    .link-btn:active { transform: translateY(0); }

    .icon-wrap {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg { width: 18px; height: 18px; }

    .icon-wrap.tiktok     { background: #111; }
    .icon-wrap.ig         { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af); }
    .icon-wrap.soundcloud { background: #ff5500; }

    .label { flex: 1; }

    .sub {
      display: block;
      font-size: 0.7rem;
      color: #555;
      font-weight: 400;
      margin-top: 1px;
    }

    .arrow {
      color: #333;
      font-size: 1rem;
      transition: color 0.15s;
    }

    .link-btn:hover .arrow { color: #666; }

    .footer {
      font-size: 0.7rem;
      color: #2a2a2a;
    }
  </style>
</head>
