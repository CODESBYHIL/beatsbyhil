<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>beatsbyhil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00ffe7;
      --magenta: #ff2d9b;
      --purple: #9b00ff;
      --yellow: #f5ff00;
      --bg: #030308;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* grid bg */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      position: relative;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan), 0 0 30px var(--cyan);
      box-shadow:
        0 0 0 1px var(--cyan),
        0 0 20px rgba(0,255,231,0.3),
        inset 0 0 20px rgba(0,255,231,0.05);
      animation: avatar-pulse 3s ease-in-out infinite;
    }

    @keyframes avatar-pulse {
      0%, 100% { box-shadow: 0 0 0 1px var(--cyan), 0 0 20px rgba(0,255,231,0.3), inset 0 0 20px rgba(0,255,231,0.05); }
      50%       { box-shadow: 0 0 0 1px var(--cyan), 0 0 40px rgba(0,255,231,0.5), inset 0 0 30px rgba(0,255,231,0.1); }
    }

    .avatar-wrap::before,
    .avatar-wrap::after {
      content: 'BH';
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 96px; height: 96px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .avatar-wrap::before {
      color: var(--magenta);
      animation: glitch-1 4s infinite;
      opacity: 0;
    }

    .avatar-wrap::after {
      color: var(--cyan);
      animation: glitch-2 4s infinite;
      opacity: 0;
    }

    @keyframes glitch-1 {
      0%, 89%, 100% { opacity: 0; transform: translate(-50%, -50%); }
      90% { opacity: 0.8; transform: translate(calc(-50% - 4px), -50%); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); }
      92% { opacity: 0; }
      94% { opacity: 0.6; transform: translate(calc(-50% + 3px), calc(-50% + 2px)); clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
      96% { opacity: 0; }
    }

    @keyframes glitch-2 {
      0%, 91%, 100% { opacity: 0; transform: translate(-50%, -50%); }
      92% { opacity: 0.7; transform: translate(calc(-50% + 5px), calc(-50% - 2px)); clip-path: polygon(0 50%, 100% 50%, 100% 65%, 0 65%); }
      94% { opacity: 0; }
    }

    /* ── NAME ── */
    .profile {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
      text-shadow: 0 0 8px var(--cyan);
      animation: name-glitch 6s infinite;
    }

    @keyframes name-glitch {
      0%, 94%, 100% { text-shadow: 0 0 8px var(--cyan); transform: none; }
      95% {
        text-shadow: -3px 0 var(--magenta), 3px 0 var(--cyan);
        transform: skew(-2deg);
      }
      96% { text-shadow: 3px 0 var(--magenta), -3px 0 var(--cyan); transform: skew(1deg); }
      97% { text-shadow: 0 0 8px var(--cyan); transform: none; }
    }

    .name::after {
      content: attr(data-text);
      position: absolute;
      left: 0; top: 0;
      color: var(--magenta);
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
      animation: name-slice 6s infinite;
      opacity: 0;
    }

    @keyframes name-slice {
      0%, 94%, 100% { opacity: 0; transform: none; }
      95% { opacity: 0.9; transform: translateX(-4px); }
      96% { opacity: 0; }
    }

    .bio {
      font-size: 0.75rem;
      color: rgba(0,255,231,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── CORNER BRACKETS ── */
    .bracket {
      position: absolute;
      width: 12px; height: 12px;
    }
    .bracket-tl { top: -6px; left: -6px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .bracket-tr { top: -6px; right: -6px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
    .bracket-bl { bottom: -6px; left: -6px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
    .bracket-br { bottom: -6px; right: -6px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 20px;
      background: rgba(0,255,231,0.03);
      border: 1px solid rgba(0,255,231,0.2);
      color: #fff;
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9375rem;
      transition: border-color 0.2s, background 0.2s;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-btn:hover {
      border-color: var(--cyan);
      background: rgba(0,255,231,0.07);
    }

    .link-btn:hover::before { opacity: 1; }

    /* per-platform hover glow */
    .link-btn.tiktok:hover    { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.15), inset 0 0 20px rgba(255,255,255,0.03); }
    .link-btn.ig:hover        { border-color: var(--magenta); box-shadow: 0 0 20px rgba(255,45,155,0.25), inset 0 0 20px rgba(255,45,155,0.05); }
    .link-btn.soundcloud:hover{ border-color: #ff5500; box-shadow: 0 0 20px rgba(255,85,0,0.25), inset 0 0 20px rgba(255,85,0,0.05); }

    /* scan line sweep on hover */
    .link-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      transition: left 0.4s ease;
    }

    .link-btn:hover::after { left: 150%; }

    .link-icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .link-icon svg { width: 22px; height: 22px; }

    .link-label {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-name {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8125rem;
    }

    .link-sub {
      font-size: 0.7rem;
      color: rgba(0,255,231,0.45);
      letter-spacing: 0.05em;
    }

    .link-arrow {
      font-size: 1rem;
      color: rgba(0,255,231,0.3);
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow { color: var(--cyan); transform: translateX(3px); }

    /* TikTok icon color */
    .link-btn.tiktok .link-icon svg { filter: drop-shadow(0 0 4px #fff); }
    .link-btn.ig .link-icon svg     { filter: drop-shadow(0 0 4px var(--magenta)); }
    .link-btn.soundcloud .link-icon svg { filter: drop-shadow(0 0 4px #ff5500); }

    /* ── FOOTER ── */
    .footer {
      font-size: 0.65rem;
      color: rgba(0,255,231,0.2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── NOISE flash ── */
    @keyframes noise {
      0%   { opacity: 0; }
      97%  { opacity: 0; }
      98%  { opacity: 0.04; }
      99%  { opacity: 0; }
      99.5%{ opacity: 0.06; }
      100% { opacity: 0; }
    }

    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 99;
      animation: noise 3s steps(1) infinite;
    }

    /* active press */
    .link-btn:active { transform: scale(0.98); }
  </style>
</head>
