<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>beatsbyhil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      color: #fff;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .name {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .bio {
      font-size: 0.875rem;
      color: #a1a1aa;
      line-height: 1.5;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: #222;
      border-color: #3a3a3a;
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-icon.tiktok      { background: #111; }
    .link-icon.ig          { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4); }
    .link-icon.soundcloud  { background: #ff5500; }

    .link-label {
      flex: 1;
    }

    .link-sub {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: #71717a;
      margin-top: 1px;
    }

    .footer {
      font-size: 0.75rem;
      color: #3f3f46;
    }
  </style>
</head>
